<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>空位查詢</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  color-scheme:light;
  --bg:#fff;
  --bg2:#f6f6f6;
  --line:#e8e8e8;
  --black:#111;
  --red:#D94F4F;
  --red-bg:rgba(217,79,79,.07);
  --gray:#999;
  --gray2:#bbb;
  --d120:#C4857A;
  --d120-bg:rgba(196,133,122,.1);
  --d90:#A8906E;
  --d90-bg:rgba(168,144,110,.1);
  --d60:#D4A882;
  --d60-bg:rgba(212,168,130,.1);
}
html,body{height:100%;overflow:hidden;background:#fff!important;color:#111;font-family:'Noto Sans TC',sans-serif}
.app{height:100%;display:flex;flex-direction:column;max-width:480px;margin:0 auto;background:#fff}

/* handle */
.handle{flex-shrink:0;padding:6px 0 0;display:flex;justify-content:center}
.handle-bar{width:28px;height:3px;background:var(--line);border-radius:2px}

/* header */
.hd{flex-shrink:0;padding:8px 16px 0}
.hd-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.hd-name{font-size:12px;color:var(--gray)}
.hd-live{display:flex;align-items:center;gap:5px;font-family:'DM Mono',monospace;font-size:10px;color:#2a9d5c}
.live-dot{width:5px;height:5px;border-radius:50%;background:#2a9d5c;animation:p 2.5s ease-in-out infinite}
@keyframes p{0%,100%{opacity:1}50%{opacity:.2}}

/* tabs */
.tabs{display:flex;background:var(--bg2);border-radius:8px;padding:2px;gap:2px}
.tab{
  flex:1;padding:8px 0;border:none;background:transparent;
  font-family:'Noto Sans TC',sans-serif;font-size:12px;
  color:var(--gray);border-radius:6px;cursor:pointer;transition:all .15s;
}
.tab.active{background:var(--bg);color:var(--black);font-weight:500;box-shadow:0 1px 4px rgba(0,0,0,.07)}

/* body */
.body{flex:1;overflow:hidden;position:relative;margin-top:8px}
.pane{position:absolute;inset:0;overflow-y:auto;padding:0 16px 10px;opacity:0;pointer-events:none;transition:opacity .15s}
.pane.active{opacity:1;pointer-events:all}
.pane::-webkit-scrollbar{width:0}

/* ── TODAY ── */

/* status hero */
.hero{padding:10px 0 10px;border-bottom:1px solid var(--line);margin-bottom:12px}
.hero-date{
  /* 日期：灰色輔助 */
  font-family:'DM Mono',monospace;font-size:10px;color:var(--gray);
  letter-spacing:.04em;margin-bottom:4px;
}
.hero-title{
  /* 狀態：黑色、大、主角 */
  font-size:17px;font-weight:500;line-height:1.25;margin-bottom:3px;
}
.hero-title.full{color:var(--red)}
.hero-sub{
  /* 說明：灰色輔助 */
  font-size:12px;color:var(--gray);line-height:1.5;
}
/* 已滿 pill */
.sold-pills{display:flex;flex-wrap:wrap;gap:5px;margin-top:5px}
.sold-pill{
  font-family:'DM Mono',monospace;font-size:10px;
  color:var(--red);background:var(--red-bg);
  border:1px solid rgba(217,79,79,.2);
  padding:2px 7px;border-radius:4px;
}

/* slot list */
.list-label{
  font-family:'DM Mono',monospace;font-size:10px;
  color:var(--gray2);letter-spacing:.07em;margin-bottom:6px;
}
.slot-list{display:flex;flex-direction:column;gap:4px}
.slot-row{
  display:flex;align-items:center;gap:12px;
  padding:8px 12px;border-radius:8px;border:1px solid var(--line);
  cursor:pointer;transition:background .12s;
}
.slot-row:active{background:var(--bg2)}
/* 時間：最重要，黑色大字 */
.slot-time{font-family:'DM Mono',monospace;font-size:15px;font-weight:500;color:var(--black);width:48px;flex-shrink:0}
/* 師傅名：黑色，正常大小 */
.slot-staff{font-size:12px;color:var(--black);flex:1}
/* 時長：灰色輔助 */
.slot-dur{font-family:'DM Mono',monospace;font-size:10px;font-weight:500;padding:2px 7px;border-radius:4px}
.slot-dur.d120{color:var(--d120);background:var(--d120-bg);border:1px solid rgba(196,133,122,.25)}
.slot-dur.d90{color:var(--d90);background:var(--d90-bg);border:1px solid rgba(168,144,110,.25)}
.slot-dur.d60{color:var(--d60);background:var(--d60-bg);border:1px solid rgba(212,168,130,.25)}

/* 全滿 next card */
.next-card{
  padding:10px 12px;border-radius:8px;border:1px solid var(--line);
  cursor:pointer;transition:background .12s;
}
.next-card:active{background:var(--bg2)}
.next-eyebrow{font-family:'DM Mono',monospace;font-size:10px;color:var(--gray);margin-bottom:5px}
.next-time-row{display:flex;align-items:baseline;gap:12px}
/* 最早時間：黑色大字 */
.next-time{font-family:'DM Mono',monospace;font-size:22px;font-weight:500;color:var(--black)}
.next-staff{font-size:12px;color:var(--black)}
.next-dur{font-family:'DM Mono',monospace;font-size:11px;font-weight:500;padding:2px 8px;border-radius:4px;margin-top:5px;display:inline-block}
.next-dur.d120{color:var(--d120);background:var(--d120-bg);border:1px solid rgba(196,133,122,.25)}
.next-dur.d90{color:var(--d90);background:var(--d90-bg);border:1px solid rgba(168,144,110,.25)}
.next-dur.d60{color:var(--d60);background:var(--d60-bg);border:1px solid rgba(212,168,130,.25)}

/* ── STAFF ── */
.staff-tabs-wrap{
  overflow-x:auto;padding:8px 16px 0;display:flex;gap:5px;
  -ms-overflow-style:none;scrollbar-width:none;
}
.staff-tabs-wrap::-webkit-scrollbar{display:none}
.stab{
  flex-shrink:0;padding:4px 11px;border-radius:20px;
  border:1px solid var(--line);background:transparent;
  font-family:'Noto Sans TC',sans-serif;font-size:11px;
  color:var(--gray);cursor:pointer;transition:all .13s;white-space:nowrap;
}
.stab.active{background:var(--black);border-color:var(--black);color:#fff}

.staff-panel{padding:10px 16px 12px;overflow-y:auto;flex:1}
.staff-panel::-webkit-scrollbar{width:0}

/* 狀態一行 */
.sp-status{
  font-size:12px;line-height:1.55;
  margin-bottom:10px;padding-bottom:10px;
  border-bottom:1px solid var(--line);
}
.sp-status .ok{color:var(--black);font-weight:500}
.sp-status .na{color:var(--red);font-weight:500}

.sp-label{font-family:'DM Mono',monospace;font-size:10px;color:var(--gray2);letter-spacing:.07em;margin-bottom:6px}

/* 日期行 */
.sp-date-row{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:6px}
/* 日期：黑色，重要 */
.sp-date{font-size:15px;font-weight:500;color:var(--black)}
/* 星期幾：灰色輔助 */
.sp-wd{font-size:11px;color:var(--gray)}
/* 幾天後 badge */
.sp-badge{
  font-family:'DM Mono',monospace;font-size:10px;
  background:var(--black);color:#fff;
  padding:2px 9px;border-radius:4px;letter-spacing:.03em;
}
.sp-badge.today{background:var(--bg2);color:var(--gray);border:1px solid var(--line)}
/* 今日已滿 badge */
.sp-badge.full{background:var(--red-bg);color:var(--red);border:1px solid rgba(217,79,79,.2)}

/* 時間卡 */
.sp-time-card{
  padding:10px 12px;border-radius:8px;border:1px solid var(--line);
  cursor:pointer;transition:background .12s;
}
.sp-time-card:active{background:var(--bg2)}
.sp-big-time{font-family:'DM Mono',monospace;font-size:26px;font-weight:500;color:var(--black);line-height:1}
.sp-dur{font-family:'DM Mono',monospace;font-size:11px;font-weight:500;padding:2px 8px;border-radius:4px;margin-top:6px;display:inline-block}
.sp-dur.d120{color:var(--d120);background:var(--d120-bg);border:1px solid rgba(196,133,122,.25)}
.sp-dur.d90{color:var(--d90);background:var(--d90-bg);border:1px solid rgba(168,144,110,.25)}
.sp-dur.d60{color:var(--d60);background:var(--d60-bg);border:1px solid rgba(212,168,130,.25)}

/* scan */
.scanning{display:flex;align-items:center;gap:8px;padding:12px 0}
.sc-t{flex:1;height:1px;background:var(--line);overflow:hidden}
.sc-t::after{content:'';display:block;height:100%;width:28%;background:var(--gray2);animation:sc .9s ease-in-out infinite}
@keyframes sc{0%{transform:translateX(-200%)}100%{transform:translateX(500%)}}
.sc-l{font-family:'DM Mono',monospace;font-size:10px;color:var(--gray2);letter-spacing:.06em;white-space:nowrap}

/* note */
.note{font-size:11px;color:var(--gray2);margin-top:18px;line-height:1.8}

/* footer */
.footer{
  flex-shrink:0;padding:6px 16px max(6px,env(safe-area-inset-bottom));
  border-top:1px solid var(--line);
  display:flex;align-items:center;justify-content:space-between;
}
.ft-note{font-family:'DM Mono',monospace;font-size:10px;color:var(--gray2)}
.ft-disclaimer{
  font-family:'DM Mono',monospace;font-size:10px;color:var(--red);
  cursor:pointer;text-decoration:underline;text-underline-offset:3px;
}

/* ── Alert sheet ── */
.mask{
  position:fixed;inset:0;background:rgba(0,0,0,.22);
  display:flex;align-items:flex-end;justify-content:center;
  z-index:100;opacity:0;pointer-events:none;transition:opacity .18s;
}
.mask.show{opacity:1;pointer-events:all}
.sheet{
  width:100%;max-width:480px;background:var(--bg);
  border-radius:14px 14px 0 0;
  padding:24px 24px max(22px,env(safe-area-inset-bottom));
  transform:translateY(14px);transition:transform .2s;
  border-top:3px solid var(--red);
}
.mask.show .sheet{transform:translateY(0)}
.sheet-tag{
  font-family:'DM Mono',monospace;font-size:10px;
  color:var(--red);letter-spacing:.09em;margin-bottom:12px;
}
.sheet-title{font-size:16px;font-weight:500;line-height:1.5;margin-bottom:10px;color:var(--black)}
.sheet-body{font-size:13px;color:var(--gray);line-height:1.85;margin-bottom:22px}
.sheet-body b{color:var(--black);font-weight:500}
.sheet-btn{
  width:100%;padding:13px;border-radius:9px;
  background:var(--black);color:#fff;
  font-family:'Noto Sans TC',sans-serif;font-size:13px;font-weight:500;
  border:none;cursor:pointer;transition:opacity .13s;
}
.sheet-btn:active{opacity:.8}
.sheet-close{
  display:block;text-align:center;margin-top:12px;
  font-size:12px;color:var(--gray2);cursor:pointer;padding:4px;
}
</style>
</head>
<body>
<div class="app">

  <div class="handle"><div class="handle-bar"></div></div>

  <div class="hd">
    <div class="hd-top">
      <div class="hd-name">小泰空位查詢機器人</div>
      <div class="hd-live"><div class="live-dot"></div>LIVE</div>
    </div>
    <div class="tabs">
      <button class="tab active" onclick="switchTab('today',this)">今日 / 最早時段</button>
      <button class="tab" onclick="switchTab('staff',this)">指定師傅</button>
    </div>
  </div>

  <div class="body">
    <div class="pane active" id="pane-today">
      <div id="today-content"></div>
    </div>
    <div class="pane" id="pane-staff" style="padding:0;display:flex;flex-direction:column;overflow:hidden">
      <div class="staff-tabs-wrap" id="staff-tabs"></div>
      <div class="staff-panel" id="staff-panel"></div>
    </div>
  </div>

  <div class="footer">
    <div class="ft-note">AI 抓取 · 非預約系統</div>
    <div class="ft-disclaimer" onclick="showAlert()">免責聲明</div>
  </div>
</div>

<!-- Alert -->
<div class="mask" id="alert" onclick="handleMask(event)">
  <div class="sheet">
    <div class="sheet-tag">DISCLAIMER</div>
    <div class="sheet-title">無法從本查詢機器人新增預約</div><div style="font-size:12px;color:var(--gray);margin:-6px 0 10px;line-height:1.6">本系統與預約系統並不互相連動</div>
    <div class="sheet-body">
      小泰空小編為解決客立樂查詢介面不便而開發此工具。資料由 AI 即時抓取，<b>僅供參考</b>，實際空位及預約請前往預約系統。
    </div>
    <button class="sheet-btn" onclick="goBooking()">前往預約系統</button>
    <span class="sheet-close" onclick="closeAlert()">關閉</span>
  </div>
</div>

<script>
const STAFF=[
  {name:'令 Ling'},{name:'曜 Yao'},{name:'澈 Che'},{name:'源 Yuan'},
  {name:'鍛 Duan'},{name:'書 Shu'},{name:'柏 Bo'},{name:'獺 Ta'}
];
let activeStaff=0;

// ── 日期工具 ──
function parseDate(str){
  const n=new Date();
  if(!str||str==='今日') return new Date(n.getFullYear(),n.getMonth(),n.getDate());
  const m=str.match(/(\d+)月(\d+)日/);
  return m?new Date(n.getFullYear(),+m[1]-1,+m[2]):new Date(n.getFullYear(),n.getMonth(),n.getDate());
}
function daysFromNow(d){const t=new Date();t.setHours(0,0,0,0);return Math.round((d-t)/86400000)}
function wd(d){return['日','一','二','三','四','五','六'][d.getDay()]}
function dateMeta(str,todayFull){
  const d=parseDate(str);
  const days=daysFromNow(d);
  let badge;
  if(days===0){
    badge=`<span class="sp-badge today">今天</span>`;
  } else if(todayFull){
    badge=`<span class="sp-badge full">今日已滿</span><span class="sp-badge" style="margin-left:4px">${days}天後</span>`;
  } else {
    badge=`<span class="sp-badge">${days}天後</span>`;
  }
  return{days,wd:wd(d),badge,label:days===0?`今日（${str}）`:str};
}
function todayFullStr(){
  const n=new Date();
  return`${n.getMonth()+1}月${n.getDate()}日　星期${wd(n)}`;
}

// ── Alert ──
function showAlert(){document.getElementById('alert').classList.add('show')}
function closeAlert(){document.getElementById('alert').classList.remove('show')}
function handleMask(e){if(e.target.id==='alert')closeAlert()}

// ── Tabs ──
function switchTab(id,btn){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.pane').forEach(p=>p.classList.remove('active'));
  document.getElementById('pane-'+id).classList.add('active');
}

// ── API ──
function callGAS(fn,...args){
  return new Promise((res,rej)=>{
    if(typeof google!=='undefined'&&google.script){
      google.script.run.withSuccessHandler(res).withFailureHandler(rej)[fn](...args);
    }else setTimeout(()=>res(mock(fn,...args)),700);
  });
}
function mock(fn,arg){
  if(fn==='getTodaySlotsData') return {
    hasToday:true,todayLabel:'3月26日',soldOut:['120min'],
    slots:[
      {date:'3月26日',time:'14:00',staff:'澈 Che',duration:'90min'},
      {date:'3月26日',time:'14:30',staff:'令 Ling',duration:'90min'},
      {date:'3月26日',time:'15:00',staff:'鍛 Duan',duration:'60min'}
    ]
  };
  if(fn==='getStaffSlotsData'){
    const m={
      '令 Ling':{todayFull:true,date:'4月3日',time:'11:00',duration:'120min'},
      '曜 Yao':{todayFull:false,date:'3月26日',time:'16:30',duration:'120min'},
      '澈 Che':{todayFull:false,date:'3月26日',time:'14:00',duration:'120min'},
      '源 Yuan':{todayFull:false,date:'3月26日',time:'17:00',duration:'120min'},
      '鍛 Duan':{todayFull:false,date:'3月26日',time:'15:30',duration:'120min'},
      '書 Shu':{todayFull:true,date:'3月28日',time:'13:00',duration:'120min'},
      '柏 Bo':{todayFull:true,date:'3月29日',time:'10:30',duration:'120min'},
      '獺 Ta':{todayFull:true,date:'4月1日',time:'14:00',duration:'120min'}
    };
    return m[arg]||{todayFull:true,date:'暫無',time:'--:--',duration:'120min'};
  }
}

function durClass(dur){
  if(!dur) return '';
  if(dur.includes('120')) return 'd120';
  if(dur.includes('90'))  return 'd90';
  if(dur.includes('60'))  return 'd60';
  return '';
}
function durLabel(dur){
  if(!dur) return dur;
  if(dur.includes('120')) return '泰空經典 120min';
  if(dur.includes('90'))  return '泰空調和 90min';
  if(dur.includes('60'))  return '泰空輕行 60min';
  return dur;
}
function scanHTML(){
  return`<div class="scanning"><div class="sc-t"></div><div class="sc-l">查詢中</div><div class="sc-t"></div></div>`;
}

// ── 今日時段 ──
async function loadToday(){
  const el=document.getElementById('today-content');
  el.innerHTML=scanHTML();
  let d;
  try{d=await callGAS('getTodaySlotsData');}
  catch(e){
    el.innerHTML=`<div class="hero"><div class="hero-title">無法取得資料</div><div class="hero-sub">請稍後再試</div></div>`;
    return;
  }

  // 全滿
  if(!d.hasToday){
    const s=d.slots&&d.slots[0];
    const{label,wd:w,badge}=s?dateMeta(s.date,true):{label:'',wd:'',badge:''};
    el.innerHTML=`
      <div class="hero">
        <div class="hero-date">${todayFullStr()}</div>
        <div class="hero-title full">今日已全滿 🈵</div>
        <div class="hero-sub">所有時段均已預約</div>
      </div>
      ${s?`
      <div class="list-label">最早可預約</div>
      <div class="next-card" onclick="showAlert()">
        <div class="next-eyebrow">${label}　星期${w}　${badge}</div>
        <div class="next-time-row">
          <div class="next-time">${s.time}</div>
          <div class="next-staff">${s.staff!=='─'?s.staff:''}</div>
        </div>
        <div class="next-dur ${durClass(s.duration)}">${durLabel(s.duration)}</div>
      </div>`:''}
      <div class="note">AI 即時抓取。本系統與預約系統不連動，實際以預約系統為準。</div>`;
    return;
  }

  // 有空位
  const avail=['120min','90min','60min'].filter(x=>!(d.soldOut||[]).includes(x));
  const soldDesc=(d.soldOut||[]).length?`${d.soldOut.map(durLabel).join('、')} 已滿。`:'';
  const sub=`${soldDesc}${avail.map(durLabel).join('、')} 仍可預約。`;
  const soldPills=(d.soldOut||[]).map(x=>`<span class="sold-pill">${durLabel(x)} 已滿</span>`).join('');

  const rows=(d.slots||[]).map(s=>`
    <div class="slot-row" onclick="showAlert()">
      <div class="slot-time">${s.time}</div>
      <div class="slot-staff">${s.staff!=='─'?s.staff:'—'}</div>
      <div class="slot-dur ${durClass(s.duration)}">${durLabel(s.duration)}</div>
    </div>`).join('');

  el.innerHTML=`
    <div class="hero">
      <div class="hero-date">${todayFullStr()}</div>
      <div class="hero-title">今日還有空位</div>
      <div class="hero-sub">${sub}</div>
      ${soldPills?`<div class="sold-pills">${soldPills}</div>`:''}
    </div>
    <div class="list-label">最早 3 個可約時段</div>
    <div class="slot-list">${rows}</div>
    <div class="note">AI 即時抓取。本系統與預約系統不連動，實際以預約系統為準。</div>`;
}

// ── 師傅 tabs ──
function buildStaffTabs(){
  const wrap=document.getElementById('staff-tabs');
  if(wrap.children.length>0) return;
  STAFF.forEach((s,i)=>{
    const b=document.createElement('button');
    b.className='stab'+(i===0?' active':'');
    b.textContent=s.name;
    b.onclick=()=>selectStaff(i,b);
    wrap.appendChild(b);
  });
}
function selectStaff(i,btn){
  if(activeStaff===i)return;
  activeStaff=i;
  document.querySelectorAll('.stab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  btn.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
  loadStaff(STAFF[i].name);
}

// ── 師傅結果 ──
async function loadStaff(name){
  const el=document.getElementById('staff-panel');
  el.innerHTML=scanHTML();
  let d;
  try{d=await callGAS('getStaffSlotsData',name);}
  catch(e){el.innerHTML=`<div class="sp-status">無法取得資料</div>`;return;}

  const{label,wd:w,badge}=dateMeta(d.date,d.todayFull);
  const n=new Date();
  const todayWd=['日','一','二','三','四','五','六'][n.getDay()];
  const todayStr=`${n.getMonth()+1}月${n.getDate()}日 星期${todayWd}`;

  const statusHTML=d.todayFull
    ?`今日（${todayStr}）<span class="na">已全滿</span>，以下為最早可約時段`
    :`今日（${todayStr}）<span class="ok">有空位</span>，以下為最早可約時段`;

  el.innerHTML=`
    <div class="sp-status">${statusHTML}</div>
    <div class="sp-label">最早可預約</div>
    <div class="sp-date-row">
      <span class="sp-date">${label}</span>
      <span class="sp-wd">星期${w}</span>
      ${badge}
    </div>
    <div class="sp-time-card" onclick="showAlert()">

      <div class="sp-dur ${durClass(d.duration)}">${durLabel(d.duration)}</div>
    </div>
    <div class="note">AI 即時抓取。本系統與預約系統不連動，實際以預約系統為準。</div>`;
}
