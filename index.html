<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>空位查詢</title>
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  color-scheme:light;
  --bg:#fff;--bg2:#f7f7f7;--bg3:#f2f2f2;--line:#e8e8e8;
  --black:#111;--red:#D94F4F;--red-bg:rgba(217,79,79,.07);
  --gray:#999;--gray2:#bbb;
  --d120:#C4857A;--d120-bg:rgba(196,133,122,.1);--d120-border:rgba(196,133,122,.3);
  --d90:#A8906E; --d90-bg:rgba(168,144,110,.1); --d90-border:rgba(168,144,110,.3);
  --d60:#D4A882; --d60-bg:rgba(212,168,130,.1); --d60-border:rgba(212,168,130,.3);
}
html,body{height:100%;overflow:hidden;background:#fff!important;color:#111;font-family:'Noto Sans TC',sans-serif}
.app{height:100%;display:flex;flex-direction:column;max-width:480px;margin:0 auto;background:#fff}

.handle{flex-shrink:0;padding:6px 0 0;display:flex;justify-content:center}
.handle-bar{width:28px;height:3px;background:var(--line);border-radius:2px}

.hd{flex-shrink:0;padding:8px 16px 0}
.hd-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.hd-name{font-size:12px;color:var(--gray)}
.hd-live{display:flex;align-items:center;gap:4px;font-family:'DM Mono',monospace;font-size:10px;color:#2a9d5c}
.live-dot{width:5px;height:5px;border-radius:50%;background:#2a9d5c;animation:p 2.5s ease-in-out infinite}
@keyframes p{0%,100%{opacity:1}50%{opacity:.2}}

.tabs{display:flex;background:var(--bg2);border-radius:8px;padding:2px;gap:2px}
.tab{flex:1;padding:6px 0;border:none;background:transparent;font-family:'Noto Sans TC',sans-serif;font-size:12px;color:var(--gray);border-radius:6px;cursor:pointer;transition:all .15s}
.tab.active{background:var(--bg);color:var(--black);font-weight:500;box-shadow:0 1px 3px rgba(0,0,0,.07)}

.body{flex:1;overflow:hidden;position:relative;margin-top:8px}
.pane{position:absolute;inset:0;overflow-y:auto;padding:0 16px 10px;opacity:0;pointer-events:none;transition:opacity .15s}
.pane.active{opacity:1;pointer-events:all}
.pane::-webkit-scrollbar{width:0}

/* date header */
.date-header{
  padding:10px 0 10px;border-bottom:1px solid var(--line);margin-bottom:14px;
}
.date-header-text{font-family:'DM Mono',monospace;font-size:10px;color:var(--gray);letter-spacing:.04em}

/* duration cards — 2列排列 */
.dur-grid{display:flex;flex-direction:column;gap:8px}

.dur-card{
  border:1px solid var(--line);border-radius:10px;
  padding:12px 14px;cursor:pointer;
  transition:background .12s;position:relative;overflow:hidden;
}
.dur-card:active{background:var(--bg2)}
.dur-card.d120{border-left:3px solid var(--d120)}
.dur-card.d90 {border-left:3px solid var(--d90)}
.dur-card.d60 {border-left:3px solid var(--d60)}

.dur-card-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px}
.dur-label{font-family:'DM Mono',monospace;font-size:10px;font-weight:500;padding:2px 8px;border-radius:4px}
.dur-label.d120{color:var(--d120);background:var(--d120-bg);border:1px solid var(--d120-border)}
.dur-label.d90 {color:var(--d90); background:var(--d90-bg); border:1px solid var(--d90-border)}
.dur-label.d60 {color:var(--d60); background:var(--d60-bg); border:1px solid var(--d60-border)}

.dur-avail-badge{
  font-family:'DM Mono',monospace;font-size:10px;
  padding:2px 8px;border-radius:4px;
}
.dur-avail-badge.today{background:#edf7f1;color:#2a9d5c;border:1px solid rgba(42,157,92,.25)}
.dur-avail-badge.future{background:var(--bg2);color:var(--gray);border:1px solid var(--line)}
.dur-avail-badge.none{background:var(--red-bg);color:var(--red);border:1px solid rgba(217,79,79,.2)}

.dur-card-body{display:flex;align-items:baseline;gap:10px}
.dur-time{font-family:'DM Mono',monospace;font-size:22px;font-weight:500;color:var(--black)}
.dur-staff{font-size:12px;color:var(--gray)}
.dur-date-hint{font-family:'DM Mono',monospace;font-size:10px;color:var(--gray2);margin-top:4px}

/* staff pane */
.staff-tabs-wrap{overflow-x:auto;padding:8px 16px 0;display:flex;gap:5px;-ms-overflow-style:none;scrollbar-width:none}
.staff-tabs-wrap::-webkit-scrollbar{display:none}
.stab{flex-shrink:0;padding:4px 11px;border-radius:20px;border:1px solid var(--line);background:transparent;font-family:'Noto Sans TC',sans-serif;font-size:11px;color:var(--gray);cursor:pointer;transition:all .13s;white-space:nowrap}
.stab.active{background:var(--black);border-color:var(--black);color:#fff}

.staff-panel{padding:10px 16px 12px;overflow-y:auto;flex:1}
.staff-panel::-webkit-scrollbar{width:0}

.sp-status{font-size:12px;line-height:1.55;margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid var(--line)}
.sp-status .ok{color:#2a9d5c;font-weight:500}
.sp-status .na{color:var(--red);font-weight:500}
.sp-label{font-family:'DM Mono',monospace;font-size:10px;color:var(--gray2);letter-spacing:.07em;margin-bottom:6px}
.sp-date-row{display:flex;align-items:center;gap:7px;flex-wrap:wrap;margin-bottom:6px}
.sp-date{font-size:15px;font-weight:500;color:var(--black)}
.sp-wd{font-size:11px;color:var(--gray)}
.sp-badge{font-family:'DM Mono',monospace;font-size:10px;background:var(--black);color:#fff;padding:2px 7px;border-radius:4px;letter-spacing:.03em}
.sp-badge.today{background:var(--bg2);color:var(--gray);border:1px solid var(--line)}
.sp-badge.full{background:var(--red-bg);color:var(--red);border:1px solid rgba(217,79,79,.2)}
.sp-time-card{padding:10px 12px;border-radius:8px;border:1px solid var(--line);cursor:pointer;transition:background .12s}
.sp-time-card:active{background:var(--bg2)}
.sp-big-time{font-family:'DM Mono',monospace;font-size:26px;font-weight:500;color:var(--black);line-height:1}
.sp-dur{font-family:'DM Mono',monospace;font-size:11px;font-weight:500;padding:2px 8px;border-radius:4px;margin-top:6px;display:inline-block}
.sp-dur.d120{color:var(--d120);background:var(--d120-bg);border:1px solid var(--d120-border)}
.sp-dur.d90 {color:var(--d90); background:var(--d90-bg); border:1px solid var(--d90-border)}
.sp-dur.d60 {color:var(--d60); background:var(--d60-bg); border:1px solid var(--d60-border)}

/* scanning */
.scanning{display:flex;flex-direction:column;align-items:center;padding:28px 0 20px;gap:14px}
.scan-avatar{width:48px;height:48px;border-radius:50%;background:var(--bg2);border:1px solid var(--line);display:flex;align-items:center;justify-content:center;font-size:20px;animation:bob 1.8s ease-in-out infinite}
@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
.scan-msg{font-size:13px;color:var(--black);font-weight:500;text-align:center;transition:opacity .2s}
.scan-sub{font-family:'DM Mono',monospace;font-size:10px;color:var(--gray2);letter-spacing:.05em;text-align:center;margin-top:3px;transition:opacity .2s}
.prog-track{width:80%;height:2px;background:var(--line);border-radius:2px;overflow:hidden}
.prog-bar{height:100%;width:0%;background:var(--black);border-radius:2px;transition:width 2s cubic-bezier(.4,0,.2,1)}

.note{font-size:10px;color:var(--gray2);margin-top:12px;line-height:1.7}

/* footer */
.footer{flex-shrink:0;padding:6px 16px max(6px,env(safe-area-inset-bottom));border-top:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;background:#fff}
.ft-note{font-family:'DM Mono',monospace;font-size:10px;color:var(--gray2)}
.ft-disclaimer{font-family:'DM Mono',monospace;font-size:10px;color:var(--red);cursor:pointer;text-decoration:underline;text-underline-offset:3px}

/* alert */
.mask{position:fixed;inset:0;background:rgba(0,0,0,.22);display:flex;align-items:flex-end;justify-content:center;z-index:100;opacity:0;pointer-events:none;transition:opacity .18s}
.mask.show{opacity:1;pointer-events:all}
.sheet{width:100%;max-width:480px;background:#fff;border-radius:14px 14px 0 0;padding:24px 24px max(22px,env(safe-area-inset-bottom));transform:translateY(14px);transition:transform .2s;border-top:3px solid var(--red)}
.mask.show .sheet{transform:translateY(0)}
.sheet-tag{font-family:'DM Mono',monospace;font-size:10px;color:var(--red);letter-spacing:.09em;margin-bottom:12px}
.sheet-title{font-size:16px;font-weight:500;line-height:1.5;margin-bottom:4px;color:var(--black)}
.sheet-body{font-size:13px;color:var(--gray);line-height:1.85;margin-bottom:16px}
.sheet-body b{color:var(--black);font-weight:500}
.sheet-btn{width:100%;padding:13px;border-radius:9px;background:var(--black);color:#fff;font-family:'Noto Sans TC',sans-serif;font-size:13px;font-weight:500;border:none;cursor:pointer}
.sheet-btn:active{opacity:.8}
.sheet-close{display:block;text-align:center;margin-top:12px;font-size:12px;color:var(--gray2);cursor:pointer;padding:4px}
</style>
</head>
<body>

<div id="db" style="position:fixed;top:0;left:0;right:0;z-index:9999;font-family:monospace;font-size:11px;padding:5px 10px;background:#fff3cd;color:#333;border-bottom:2px solid #ffc107">載入中...</div>

<div class="app">
  <div class="handle"><div class="handle-bar"></div></div>
  <div class="hd">
    <div class="hd-top">
      <div class="hd-name">小泰空位查詢機器人</div>
      <div class="hd-live"><div class="live-dot"></div>LIVE</div>
    </div>
    <div class="tabs">
      <button class="tab active" onclick="switchTab('today',this)">今日 / 最早時段</button>
      <button class="tab" onclick="switchTab('staff',this)">指定老師</button>
    </div>
  </div>
  <div class="body">
    <div class="pane active" id="pane-today">
      <div id="today-content"></div>
    </div>
    <div class="pane" id="pane-staff" style="padding:0;display:flex;flex-direction:column;overflow:hidden">
      <div class="staff-tabs-wrap" id="staff-tabs"></div>
      <div class="staff-panel" id="staff-panel"></div>
    </div>
  </div>
  <div class="footer">
    <div class="ft-note">AI 抓取 · 非預約系統</div>
    <div class="ft-disclaimer" onclick="showAlert()">免責聲明</div>
  </div>
</div>

<div class="mask" id="alert" onclick="handleMask(event)">
  <div class="sheet">
    <div class="sheet-tag">DISCLAIMER</div>
    <div class="sheet-title">本機器人無法直接新增預約</div>
    <div class="sheet-body">
      此工具由小泰空小編開發，AI 即時抓取空位資訊供參考。<br><br>
      看到合適時段後，請<b>記下時段與老師</b>，點下方按鈕前往預約系統完成預約。
    </div>
    <button class="sheet-btn" onclick="goBooking()">前往預約系統</button>
    <span class="sheet-close" onclick="closeAlert()">關閉</span>
  </div>
</div>

<script>
const STAFF=[
  {name:'令 Ling'},{name:'曜 Yao'},{name:'澈 Che'},{name:'源 Yuan'},
  {name:'鍛 Duan'},{name:'書 Shu'},{name:'柏 Bo'},{name:'獺 Ta'}
];
let activeStaff=0;
let scanTimer=null;

const GAS_URL='https://script.google.com/macros/s/AKfycbzOq_KPdSh_jRKSyg4-GMf-Z-AtrJLc1cH1yTVDNJVd2uo92cbe-wasenTlx6tz2DMXKQ/exec';

// ── 日期工具 ──
function parseDate(str){
  const n=new Date();
  if(!str||str==='今日') return new Date(n.getFullYear(),n.getMonth(),n.getDate());
  const m=str.match(/(\d+)月(\d+)日/);
  return m?new Date(n.getFullYear(),+m[1]-1,+m[2]):new Date(n.getFullYear(),n.getMonth(),n.getDate());
}
function daysFromNow(d){const t=new Date();t.setHours(0,0,0,0);return Math.round((d-t)/86400000)}
function wd(d){return['日','一','二','三','四','五','六'][d.getDay()]}
function daysLabel(n){
  if(n===0) return '今天';
  if(n===1) return '明天';
  if(n===2) return '後天';
  return n+'天後';
}
function dateMeta(str,todayFull){
  const d=parseDate(str);const days=daysFromNow(d);
  let badge;
  if(days===0) badge=`<span class="sp-badge today">今天</span>`;
  else if(todayFull) badge=`<span class="sp-badge full">今日已滿</span><span class="sp-badge" style="margin-left:4px">${daysLabel(days)}</span>`;
  else badge=`<span class="sp-badge">${daysLabel(days)}</span>`;
  return{days,wd:wd(d),badge,label:days===0?`今日（${str}）`:str};
}
function todayFullStr(){
  const n=new Date();
  return`${n.getMonth()+1}月${n.getDate()}日　星期${wd(n)}`;
}
function durClass(dur){
  if(!dur) return '';
  if(dur.includes('120')) return 'd120';
  if(dur.includes('90'))  return 'd90';
  return 'd60';
}
function durName(dur){
  if(!dur) return dur;
  if(dur.includes('120')) return '泰空經典';
  if(dur.includes('90'))  return '泰空調和';
  return '泰空輕行';
}
function durMin(dur){
  if(!dur) return '';
  if(dur.includes('120')) return '120min';
  if(dur.includes('90'))  return '90min';
  return '60min';
}

// ── Debug ──
function dbg(msg){const el=document.getElementById('db');if(el){el.style.display='block';el.textContent=msg;}}
function dbgHide(){const el=document.getElementById('db');if(el)el.style.display='none';}

// ── Alert ──
function showAlert(){document.getElementById('alert').classList.add('show')}
function closeAlert(){document.getElementById('alert').classList.remove('show')}
function handleMask(e){if(e.target.id==='alert')closeAlert()}
function goBooking(){
  const url='https://liff.line.me/2007603682-rDEPkdA2/a33MS6uxvrwXxin2jHTk4N/menu';
  closeAlert();
  if(typeof liff!=='undefined'&&liff.isInClient()){
    liff.openWindow({url,external:false});
  }else{location.href=url;}
}

// ── Tabs ──
function switchTab(id,btn){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.pane').forEach(p=>p.classList.remove('active'));
  document.getElementById('pane-'+id).classList.add('active');
}

// ── GAS 呼叫 ──
function callGAS(fn,...args){
  return new Promise((res,rej)=>{
    let url=GAS_URL;
    if(fn==='getTodaySlotsData') url+='?action=today';
    else if(fn==='getStaffSlotsData') url+=`?action=staff&staff=${encodeURIComponent(args[0])}`;
    else if(fn==='ping') url+='?action=ping';
    fetch(url)
      .then(r=>r.json())
      .then(data=>{if(data&&data.error)rej(new Error(data.error));else res(data);})
      .catch(rej);
  });
}

// ── 載入動畫 ──
const TODAY_MSGS=[
  {msg:'正在掃描今日空位…',sub:'連線中，請稍候 🔍'},
  {msg:'比對所有老師時段中…',sub:'快好了，再等一下 ✨'},
  {msg:'整理最新資料…',sub:'馬上就來 📋'},
  {msg:'即將顯示結果…',sub:'感謝耐心等待 🙏'},
];
const STAFF_MSGS=[
  {msg:'查詢老師時段中…',sub:'即時連線預約系統 🔍'},
  {msg:'比對可預約時間…',sub:'快好了 ✨'},
  {msg:'即將顯示結果…',sub:'感謝耐心等待 🙏'},
];

function scanHTML(msgs){
  const id='sr'+Date.now();
  setTimeout(()=>{
    const el=document.getElementById(id);
    if(!el) return;
    const msgEl=el.querySelector('.scan-msg');
    const subEl=el.querySelector('.scan-sub');
    const bar=el.querySelector('.prog-bar');
    let step=0;
    msgEl.textContent=msgs[0].msg;
    subEl.textContent=msgs[0].sub;
    bar.getBoundingClientRect();
    bar.style.width='15%';
    if(scanTimer) clearInterval(scanTimer);
    scanTimer=setInterval(()=>{
      step=Math.min(step+1,msgs.length-1);
      bar.style.width=(15+(step/(msgs.length-1))*70)+'%';
      msgEl.style.opacity='0';subEl.style.opacity='0';
      setTimeout(()=>{
        msgEl.textContent=msgs[step].msg;
        subEl.textContent=msgs[step].sub;
        msgEl.style.opacity='1';subEl.style.opacity='1';
      },200);
    },2200);
  },80);
  return`<div class="scanning" id="${id}">
    <div class="scan-avatar">🤖</div>
    <div>
      <div class="scan-msg"></div>
      <div class="scan-sub"></div>
    </div>
    <div class="prog-track"><div class="prog-bar"></div></div>
  </div>`;
}
function stopScan(){
  if(scanTimer){clearInterval(scanTimer);scanTimer=null;}
  document.querySelectorAll('.prog-bar').forEach(b=>{b.style.transition='width .3s ease';b.style.width='100%';});
}

// ── 今日時段（各時長一張卡）──
async function loadToday(){
  const el=document.getElementById('today-content');
  el.innerHTML=scanHTML(TODAY_MSGS);
  let d;
  try{d=await callGAS('getTodaySlotsData');}
  catch(e){
    stopScan();
    el.innerHTML=`<div style="padding:16px 0;font-size:12px;color:#D94F4F">❌ 無法取得資料，請重新整理</div>`;
    return;
  }
  stopScan();
  if(!d){el.innerHTML=`<div style="padding:16px 0;font-size:12px;color:var(--gray)">近期暫無可用時段</div>`;return;}

  const DURS=['120min','90min','60min'];
  const cards=DURS.map(dur=>{
    const slot=d.byDuration&&d.byDuration[dur];
    const cls=durClass(dur);
    const name=durName(dur);
    const min=durMin(dur);

    if(!slot){
      // 這個時長完全無資料
      return `<div class="dur-card ${cls}">
        <div class="dur-card-top">
          <span class="dur-label ${cls}">${name} ${min}</span>
          <span class="dur-avail-badge none">暫無資料</span>
        </div>
        <div style="font-size:12px;color:var(--gray2)">─</div>
      </div>`;
    }

    const slotDate=parseDate(slot.date);
    const days=daysFromNow(slotDate);
    const weekday=wd(slotDate);

    const availBadge=slot.hasToday
      ?`<span class="dur-avail-badge today">今日有空</span>`
      :`<span class="dur-avail-badge future">今日已滿</span>`;

    const dateHint=slot.hasToday
      ?''
      :`<div class="dur-date-hint">${slot.date} 星期${weekday} · ${daysLabel(days)}</div>`;

    const staffStr=slot.staff&&slot.staff!=='─'?slot.staff:'';

    return `<div class="dur-card ${cls}" onclick="showAlert()">
      <div class="dur-card-top">
        <span class="dur-label ${cls}">${name} ${min}</span>
        ${availBadge}
      </div>
      <div class="dur-card-body">
        <div class="dur-time">${slot.time}</div>
        ${staffStr?`<div class="dur-staff">${staffStr}</div>`:''}
      </div>
      ${dateHint}
    </div>`;
  }).join('');

  el.innerHTML=`
    <div class="date-header">
      <div class="date-header-text">${todayFullStr()}</div>
    </div>
    <div class="dur-grid">${cards}</div>
    <div class="note">AI 即時抓取。本系統與預約系統不連動，實際以預約系統為準。</div>`;
}

// ── 師傅 tabs ──
function buildStaffTabs(){
  const wrap=document.getElementById('staff-tabs');
  if(wrap.children.length>0) return;
  STAFF.forEach((s,i)=>{
    const b=document.createElement('button');
    b.className='stab'+(i===0?' active':'');
    b.textContent=s.name;
    b.onclick=()=>selectStaff(i,b);
    wrap.appendChild(b);
  });
}
function selectStaff(i,btn){
  if(activeStaff===i) return;
  activeStaff=i;
  document.querySelectorAll('.stab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  btn.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
  loadStaff(STAFF[i].name);
}

// ── 師傅結果 ──
async function loadStaff(name){
  const el=document.getElementById('staff-panel');
  el.innerHTML=scanHTML(STAFF_MSGS);
  let d;
  try{d=await callGAS('getStaffSlotsData',name);}
  catch(e){stopScan();el.innerHTML=`<div style="padding:16px 0;font-size:12px;color:#D94F4F">❌ 無法取得資料</div>`;return;}
  stopScan();

  const{label,wd:w,badge}=dateMeta(d.date,d.todayFull);
  const n=new Date();
  const todayStr=`${n.getMonth()+1}月${n.getDate()}日 星期${wd(n)}`;
  const statusHTML=d.todayFull
    ?`今日（${todayStr}）<span class="na">已全滿</span>，以下為最早可約時段`
    :`今日（${todayStr}）<span class="ok">有空位</span>，以下為最早可約時段`;

  el.innerHTML=`
    <div class="sp-status">${statusHTML}</div>
    <div class="sp-label">最早可預約</div>
    <div class="sp-date-row">
      <span class="sp-date">${label}</span>
      <span class="sp-wd">星期${w}</span>
      ${badge}
    </div>
    <div class="sp-time-card" onclick="showAlert()">
      <div class="sp-big-time">${d.time}</div>
      <div class="sp-dur ${durClass(d.duration)}">${durName(d.duration)} ${durMin(d.duration)}</div>
    </div>
    <div class="note">AI 即時抓取。本系統與預約系統不連動，實際以預約系統為準。</div>`;
}

// ── 初始化 ──
function initApp(){
  dbg('連線中...');
  if(typeof liff!=='undefined'){
    liff.init({liffId:'2009610906-9zraEtAy'})
      .then(()=>dbg('LIFF OK'))
      .catch(e=>dbg('LIFF skip: '+e.message));
  }
  fetch(GAS_URL+'?action=ping')
    .then(r=>r.json())
    .then(()=>{
      dbgHide();
      loadToday();
      buildStaffTabs();
      loadStaff(STAFF[0].name);
    })
    .catch(e=>{
      dbg('連線失敗: '+e.message);
      document.getElementById('today-content').innerHTML=
        `<div style="padding:16px 0;font-size:12px;color:#D94F4F">❌ 伺服器連線失敗，請重新整理</div>`;
    });
}
initApp();
</script>
