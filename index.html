<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>空位查詢</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#fff;--bg2:#f7f7f7;--bg3:#fafafa;--line:#e8e8e8;--line2:#ebebeb;
  --black:#111;--gray:#999;--gray2:#bbb;--gray3:#ccc;
  --red:#D94F4F;--red-bg:rgba(217,79,79,.07);--red-bdr:rgba(217,79,79,.2);
  --green:#2a9d5c;
  --d120:#C4857A;--d120-bg:rgba(196,133,122,.10);--d120-bdr:rgba(196,133,122,.28);
  --d90:#A8906E; --d90-bg:rgba(168,144,110,.10); --d90-bdr:rgba(168,144,110,.28);
  --d60:#D4A882; --d60-bg:rgba(212,168,130,.10); --d60-bdr:rgba(212,168,130,.28);
}
html,body{height:100%;overflow:hidden;background:#fff;font-family:'Noto Sans TC',sans-serif;color:var(--black)}
.app{height:100%;display:flex;flex-direction:column;max-width:480px;margin:0 auto;background:#fff}

.handle{flex-shrink:0;padding:5px 0 0;display:flex;justify-content:center}
.handle-bar{width:28px;height:3px;background:var(--line);border-radius:2px}

.hd{flex-shrink:0;padding:5px 14px 0}
.hd-top{display:flex;align-items:center;justify-content:space-between;margin-bottom:5px}
.hd-name{font-size:11px;color:var(--gray)}
.hd-live{display:flex;align-items:center;gap:4px;font-family:'DM Mono',monospace;font-size:10px;color:var(--green)}
.live-dot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:livepulse 2.5s ease-in-out infinite}
@keyframes livepulse{0%,100%{opacity:1}50%{opacity:.2}}

.tabs{display:flex;background:var(--bg2);border-radius:7px;padding:2px;gap:2px}
.tab{flex:1;padding:5px 0;border:none;background:transparent;font-family:'Noto Sans TC',sans-serif;font-size:12px;color:var(--gray);border-radius:5px;cursor:pointer;transition:all .15s}
.tab.active{background:#fff;color:var(--black);font-weight:500;box-shadow:0 1px 3px rgba(0,0,0,.07)}

.filters{flex-shrink:0;border-bottom:1px solid #ebebeb;background:var(--bg3)}
.filter-bar{display:flex;gap:5px;padding:5px 14px 5px}
.branch-bar{display:none;gap:5px;padding:0 14px 5px}

.filter-pill{flex:1;display:flex;align-items:center;justify-content:center;gap:4px;padding:4px 0;border-radius:5px;border:1.5px solid #e0e0e0;background:#fff;cursor:pointer;transition:all .15s}
.filter-pill.on-120{border-color:var(--d120);background:var(--d120-bg)}
.filter-pill.on-90 {border-color:var(--d90); background:var(--d90-bg)}
.filter-pill.on-60 {border-color:var(--d60); background:var(--d60-bg)}
.pill-box{width:11px;height:11px;border-radius:2px;border:1.5px solid #ccc;background:#fff;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.filter-pill.on-120 .pill-box{border-color:var(--d120);background:var(--d120)}
.filter-pill.on-90  .pill-box{border-color:var(--d90); background:var(--d90)}
.filter-pill.on-60  .pill-box{border-color:var(--d60); background:var(--d60)}
.pill-check{display:none}
.filter-pill.on-120 .pill-check,.filter-pill.on-90 .pill-check,.filter-pill.on-60 .pill-check{display:block}
.pill-text{font-family:'DM Mono',monospace;font-size:10px;color:#aaa;line-height:1;white-space:nowrap;transition:color .15s}
.filter-pill.on-120 .pill-text{color:var(--d120);font-weight:500}
.filter-pill.on-90  .pill-text{color:var(--d90); font-weight:500}
.filter-pill.on-60  .pill-text{color:var(--d60); font-weight:500}

.body{flex:1;overflow:hidden;position:relative}
.pane{position:absolute;inset:0;overflow-y:auto;opacity:0;pointer-events:none;transition:opacity .15s;padding-bottom:6px}
.pane.active{opacity:1;pointer-events:all}
.pane::-webkit-scrollbar{display:none}

.status-bar{display:flex;align-items:center;gap:6px;padding:6px 14px 4px}
.status-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
.status-text{font-size:13px;font-weight:500;line-height:1.3}

.sec-label{font-family:'DM Mono',monospace;font-size:9px;color:var(--gray2);letter-spacing:.07em;padding:0 14px 5px}

.card-row{display:flex;gap:6px;padding:0 12px}

.card{flex:1 1 0;min-width:0;cursor:pointer}
.card-inner{
  height:148px;background:#f5f5f5;border:1px solid #e2e2e2;border-radius:8px;
  overflow:hidden;display:flex;flex-direction:column;transition:background .12s;position:relative;
}
.card-inner:active{background:#ececec}

.card-teacher-banner{flex-shrink:0;padding:4px 7px;display:flex;align-items:center;justify-content:space-between}
.card-teacher-name{font-size:11px;font-weight:500;color:#fff;letter-spacing:.02em;line-height:1}
.card-rank{font-family:'DM Mono',monospace;font-size:9px;color:rgba(255,255,255,.6)}

.card-body{flex:1;padding:5px 7px 5px;display:flex;flex-direction:column;background:#f5f5f5}

.card-near-row{display:flex;align-items:center;gap:3px;margin-bottom:1px;flex-shrink:0}
.near-badge{font-family:'DM Mono',monospace;font-size:10px;font-weight:700;padding:1px 5px;border-radius:3px;line-height:1.5}
.near-badge.today{background:var(--black);color:#fff}
.near-badge.other{background:#e0e0e0;color:#444}
.full-badge{font-family:'DM Mono',monospace;font-size:8.5px;font-weight:500;padding:1px 4px;border-radius:3px;line-height:1.5;background:var(--red-bg);border:1px solid var(--red-bdr);color:var(--red)}

.card-date-row{display:flex;align-items:baseline;gap:3px;margin-bottom:3px;flex-shrink:0}
.card-mmdd{font-family:'DM Mono',monospace;font-size:10px;font-weight:500;color:#333}
.card-wd{font-family:'DM Mono',monospace;font-size:9px;color:var(--gray)}

.card-time{font-family:'DM Mono',monospace;font-size:22px;font-weight:500;color:var(--black);letter-spacing:-1px;line-height:1;margin-bottom:4px;flex-shrink:0}
.card-div{height:1px;background:#e0e0e0;flex-shrink:0;margin-bottom:4px}
.card-durs{display:flex;flex-wrap:wrap;gap:3px;flex:1;align-content:flex-start;overflow:hidden}
.dur-pill{font-family:'DM Mono',monospace;font-size:8.5px;font-weight:500;padding:1px 4px;border-radius:3px;line-height:1.5;white-space:nowrap;display:inline-block}
.dur-pill.d120{color:var(--d120);background:rgba(196,133,122,.13);border:1px solid var(--d120-bdr)}
.dur-pill.d90 {color:var(--d90); background:rgba(168,144,110,.13);border:1px solid var(--d90-bdr)}
.dur-pill.d60 {color:var(--d60); background:rgba(212,168,130,.13);border:1px solid var(--d60-bdr)}

.card-empty{flex:1 1 0;min-width:0}
.card-empty-inner{height:148px;border:1px dashed #efefef;border-radius:8px;display:flex;align-items:center;justify-content:center}
.card-empty-line{width:14px;height:1px;background:#e8e8e8}

/* ── skeleton card ── */
.card-skeleton .card-inner{cursor:default;animation:none}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
.skel-banner{height:26px;background:linear-gradient(90deg,#e8e8e8 25%,#f0f0f0 50%,#e8e8e8 75%);background-size:200% 100%;animation:shimmer 1.4s ease-in-out infinite;flex-shrink:0}
.skel-line{border-radius:3px;background:linear-gradient(90deg,#e8e8e8 25%,#f0f0f0 50%,#e8e8e8 75%);background-size:200% 100%;animation:shimmer 1.4s ease-in-out infinite}

@keyframes bob{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
@keyframes skelsh{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes flipin{from{opacity:0;transform:perspective(500px) rotateY(-70deg)}to{opacity:1;transform:perspective(500px) rotateY(0deg)}}
.flip-1{animation:flipin .4s cubic-bezier(.4,0,.2,1) both}
.flip-2{animation:flipin .4s cubic-bezier(.4,0,.2,1) .11s both}
.flip-3{animation:flipin .4s cubic-bezier(.4,0,.2,1) .22s both}

.stab-wrap{display:flex;gap:5px;padding:6px 14px 7px;overflow-x:auto;scrollbar-width:none}
.stab-wrap::-webkit-scrollbar{display:none}
.stab{flex-shrink:0;padding:3px 10px;border-radius:20px;border:1px solid var(--line);background:transparent;font-family:'Noto Sans TC',sans-serif;font-size:11px;color:var(--gray);cursor:pointer;transition:all .13s;white-space:nowrap}
.stab.active{background:var(--black);border-color:var(--black);color:#fff}

.footer{flex-shrink:0;padding:5px 14px max(5px,env(safe-area-inset-bottom));border-top:1px solid var(--line);display:flex;align-items:center;justify-content:space-between;gap:8px;background:#fff}
.ft-note{font-size:9.5px;color:var(--gray2);line-height:1.5;flex:1}
.ft-disc{font-family:'DM Mono',monospace;font-size:10px;color:var(--red);cursor:pointer;text-decoration:underline;text-underline-offset:3px;flex-shrink:0}

.mask{position:fixed;inset:0;background:rgba(0,0,0,.22);display:flex;align-items:flex-end;justify-content:center;z-index:100;opacity:0;pointer-events:none;transition:opacity .18s}
.mask.show{opacity:1;pointer-events:all}
.sheet{width:100%;max-width:480px;background:#fff;border-radius:14px 14px 0 0;padding:24px 24px max(22px,env(safe-area-inset-bottom));transform:translateY(14px);transition:transform .2s;border-top:3px solid var(--red)}
.mask.show .sheet{transform:translateY(0)}
.sheet-tag{font-family:'DM Mono',monospace;font-size:10px;color:var(--red);letter-spacing:.09em;margin-bottom:12px}
.sheet-title{font-size:16px;font-weight:500;line-height:1.4;margin-bottom:4px}
.slot-summary{display:flex;align-items:center;gap:10px;flex-wrap:wrap;padding:8px 10px;border-radius:7px;background:var(--bg2);border:1px solid var(--line2);margin:8px 0 12px}
.slot-time-big{font-family:'DM Mono',monospace;font-size:20px;font-weight:500;color:var(--black);letter-spacing:-.5px}
.slot-meta{flex:1}
.slot-meta-name{font-size:12px;color:var(--black);font-weight:500}
.slot-meta-date{font-family:'DM Mono',monospace;font-size:10px;color:var(--gray)}
.slot-dur-pills{display:flex;gap:4px;flex-wrap:wrap;margin-left:auto}
.slot-dur-pill{font-family:'DM Mono',monospace;font-size:9px;font-weight:500;padding:2px 6px;border-radius:3px;white-space:nowrap}
.slot-dur-pill.d120{color:var(--d120);background:var(--d120-bg);border:1px solid var(--d120-bdr)}
.slot-dur-pill.d90 {color:var(--d90); background:var(--d90-bg); border:1px solid var(--d90-bdr)}
.slot-dur-pill.d60 {color:var(--d60); background:var(--d60-bg); border:1px solid var(--d60-bdr)}
.sheet-body{font-size:13px;color:var(--gray);line-height:1.85;margin-bottom:16px}
.sheet-body b{color:var(--black);font-weight:500}
.sheet-btn{width:100%;padding:13px;border-radius:9px;background:var(--black);color:#fff;font-family:'Noto Sans TC',sans-serif;font-size:13px;font-weight:500;border:none;cursor:pointer}
.sheet-btn:active{opacity:.8}
.sheet-close{display:block;text-align:center;margin-top:12px;font-size:12px;color:var(--gray2);cursor:pointer;padding:4px}
</style>
</head>
<body>
<div class="app">
  <div class="handle"><div class="handle-bar"></div></div>

  <div class="hd">
    <div class="hd-top">
      <div class="hd-name">小泰空位查詢機器人</div>
      <div class="hd-live"><div class="live-dot"></div>LIVE</div>
    </div>
    <div class="tabs">
      <button class="tab active" onclick="switchTab('today',this)">今日 / 最早時段</button>
      <button class="tab" onclick="switchTab('staff',this)">指定老師</button>
    </div>
  </div>

  <div class="filters">
    <div class="filter-bar">
      <button class="filter-pill on-120" id="pill-120" onclick="toggleDur(120)">
        <div class="pill-box"><svg class="pill-check" width="8" height="8" viewBox="0 0 8 8" fill="none"><path d="M1.5 4L3.2 5.7L6.5 2" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
        <span class="pill-text">120min 泰空經典</span>
      </button>
      <button class="filter-pill on-90" id="pill-90" onclick="toggleDur(90)">
        <div class="pill-box"><svg class="pill-check" width="8" height="8" viewBox="0 0 8 8" fill="none"><path d="M1.5 4L3.2 5.7L6.5 2" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
        <span class="pill-text">90min 泰空調和</span>
      </button>
      <button class="filter-pill on-60" id="pill-60" onclick="toggleDur(60)">
        <div class="pill-box"><svg class="pill-check" width="8" height="8" viewBox="0 0 8 8" fill="none"><path d="M1.5 4L3.2 5.7L6.5 2" stroke="#fff" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></div>
        <span class="pill-text">60min 泰空輕行</span>
      </button>
    </div>
    <div class="branch-bar" id="branch-bar"></div>
  </div>

  <div class="body">
    <div class="pane active" id="pane-today">
      <div class="status-bar" id="status-today"></div>
      <div class="sec-label" id="label-today">最早可約 · 3 位不同老師</div>
      <div class="card-row" id="cards-today"></div>
    </div>
    <div class="pane" id="pane-staff">
      <div class="stab-wrap" id="staff-tabs"></div>
      <div class="status-bar" id="status-staff"></div>
      <div class="sec-label">最早可約 3 筆</div>
      <div class="card-row" id="cards-staff"></div>
    </div>
  </div>

  <div class="footer">
    <div class="ft-note">AI 即時抓取。本系統與預約系統互相獨立，實際以預約系統為準。</div>
    <div class="ft-disc" onclick="openSheet(null)">免責聲明</div>
  </div>
</div>

<div class="mask" id="mask" onclick="handleMaskClick(event)">
  <div class="sheet">
    <div class="sheet-tag">DISCLAIMER</div>
    <div class="sheet-title">本機器人無法直接新增預約</div>
    <div id="slot-summary-wrap"></div>
    <div class="sheet-body">
      此工具由小泰空小編開發，AI 即時抓取空位資訊供參考。<br><br>
      看到合適時段後，請依序<b>記下方案、老師、日期與時段</b>，點下方按鈕前往預約系統完成預約。
    </div>
    <button class="sheet-btn" onclick="goBooking()">前往預約系統</button>
    <span class="sheet-close" onclick="closeSheet()">關閉</span>
  </div>
</div>

<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<script>
const GAS_URL = 'https://script.google.com/macros/s/AKfycbzOq_KPdSh_jRKSyg4-GMf-Z-AtrJLc1cH1yTVDNJVd2uo92cbe-wasenTlx6tz2DMXKQ/exec';
const LIFF_ID = '2009610906-9zraEtAy';

const WD = ['日','一','二','三','四','五','六'];

const TEACHER_COLOR = {
  '令 Ling':'#6B7A8D','曜 Yao':'#7A6B6B','澈 Che':'#5C7A6E',
  '源 Yuan':'#7A6B52','鍛 Duan':'#6B5C7A','書 Shu':'#7A6B5C',
  '柏 Bo':'#5C6B7A','獺 Ta':'#7A5C6B',
};

const DUR_CONFIG = {
  120:{ cls:'d120', short:'120min', full:'120min 泰空經典' },
  90: { cls:'d90',  short:'90min',  full:'90min 泰空調和'  },
  60: { cls:'d60',  short:'60min',  full:'60min 泰空輕行'  },
};

const STAFF_LIST = ['令 Ling','曜 Yao','澈 Che','源 Yuan','鍛 Duan','書 Shu','柏 Bo','獺 Ta'];

let selectedDurs = [60, 90, 120];
let activeStaff  = '令 Ling';
let currentTab   = 'today';
const tabSlots   = { today: [], staff: [] };
const cache      = { today: null, staff: {} };

// ── 日期工具 ──────────────────────────────────────────────────
function dateMeta(dateKey) {
  const [y,m,d] = dateKey.split('-').map(Number);
  const date = new Date(y, m-1, d);
  const now  = new Date();
  const base = new Date(now.getFullYear(), now.getMonth(), now.getDate());
  const diff = Math.round((date - base) / 86400000);
  const mmdd = `${date.getMonth()+1}月${date.getDate()}日`;
  const wd   = `週${WD[date.getDay()]}`;
  const nearLabel = diff===0?'今日':diff===1?'明天':diff===2?'後天':`${diff}天後`;
  return { mmdd, wd, nearLabel, diff };
}

function todayKey() {
  const n = new Date();
  return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')}`;
}

// ── API ───────────────────────────────────────────────────────
function callGAS(params) {
  const qs = Object.keys(params).map(k => k+'='+encodeURIComponent(params[k])).join('&');
  return fetch(GAS_URL + '?' + qs).then(r => r.json());
}

// ── 預熱 GAS（頁面載入立刻 ping，讓 GAS container 提前暖好）──
function warmupGAS() {
  fetch(GAS_URL + '?action=ping').catch(() => {});
}

// ── Skeleton 佔位卡片 ─────────────────────────────────────────
function skeletonCardHTML() {
  return `
  <div class="card card-skeleton">
    <div class="card-inner">
      <div class="skel-banner"></div>
      <div class="card-body">
        <div style="display:flex;gap:4px;margin-bottom:4px">
          <div class="skel-line" style="width:36px;height:16px"></div>
          <div class="skel-line" style="width:48px;height:16px"></div>
        </div>
        <div class="skel-line" style="width:60px;height:13px;margin-bottom:5px"></div>
        <div class="skel-line" style="width:70px;height:28px;margin-bottom:6px"></div>
        <div style="height:1px;background:#e8e8e8;margin-bottom:5px"></div>
        <div style="display:flex;gap:3px">
          <div class="skel-line" style="width:38px;height:14px"></div>
          <div class="skel-line" style="width:32px;height:14px"></div>
        </div>
      </div>
    </div>
  </div>`;
}

// ── 載入動畫：掃描機器人 → 骨架卡片 ────────────────────────
const SCAN_STEPS = [
  {av:'🤖', msg:'機器人出動中…',      sub:'SCANNING',   pct:10},
  {av:'📡', msg:'連線預約系統中…',     sub:'CONNECTING', pct:28},
  {av:'🔍', msg:'掃描所有老師時段…',   sub:'FETCHING',   pct:52},
  {av:'⚙️', msg:'比對可預約時間…',     sub:'PROCESSING', pct:75},
  {av:'📋', msg:'整理資料中，快好了…', sub:'SORTING',    pct:92},
];
let scanTimer = null;

function showScanning(containerId, statusId) {
  document.getElementById(statusId).innerHTML = '';
  // 用 width:100% 讓 scan UI 撐滿 card-row 的 flex 容器
  document.getElementById(containerId).innerHTML = `
    <div id="scan-ui" style="width:100%;display:flex;flex-direction:column;align-items:center;padding:22px 0 16px;gap:14px;transition:opacity .3s ease">
      <div id="scan-av" style="width:50px;height:50px;border-radius:50%;background:#f2f2f2;border:1px solid #e8e8e8;display:flex;align-items:center;justify-content:center;font-size:22px;animation:bob 1.8s ease-in-out infinite;flex-shrink:0">🤖</div>
      <div style="text-align:center">
        <div id="scan-msg" style="font-size:12px;color:var(--gray);transition:opacity .2s">${SCAN_STEPS[0].msg}</div>
        <div id="scan-sub" style="font-family:'DM Mono',monospace;font-size:10px;color:var(--gray3);letter-spacing:.04em;margin-top:2px">${SCAN_STEPS[0].sub}</div>
      </div>
      <div style="width:70%;height:2px;background:#f0f0f0;border-radius:2px;overflow:hidden">
        <div id="sbar" style="height:100%;width:5%;background:var(--black);border-radius:2px;transition:width 1.8s cubic-bezier(.4,0,.2,1)"></div>
      </div>
    </div>`;
  setTimeout(() => { const b=document.getElementById('sbar'); if(b) b.style.width='10%'; }, 80);

  let step = 0;
  if (scanTimer) clearInterval(scanTimer);
  scanTimer = setInterval(() => {
    step++;
    if (step >= SCAN_STEPS.length) {
      clearInterval(scanTimer); scanTimer = null;
      const ui = document.getElementById('scan-ui');
      if (ui) ui.style.opacity = '0';
      setTimeout(() => {
        const row = document.getElementById(containerId);
        if (!row) return;
        // 骨架卡片用 flex row 包起來，確保三欄並排
        row.innerHTML = `<div id="skel-fade" style="width:100%;display:flex;gap:6px;opacity:0;transition:opacity .35s ease">
          ${skeletonCardHTML()}${skeletonCardHTML()}${skeletonCardHTML()}
        </div>`;
        setTimeout(() => { const w=document.getElementById('skel-fade'); if(w) w.style.opacity='1'; }, 30);
      }, 300);
      return;
    }
    const s = SCAN_STEPS[step];
    const msg = document.getElementById('scan-msg');
    const av  = document.getElementById('scan-av');
    const sub = document.getElementById('scan-sub');
    const bar = document.getElementById('sbar');
    if (msg) { msg.style.opacity='0'; setTimeout(()=>{ msg.textContent=s.msg; msg.style.opacity='1'; },180); }
    if (av)  { av.style.transform='scale(.85)'; setTimeout(()=>{ av.textContent=s.av; av.style.transform='scale(1)'; av.style.transition='transform .2s'; },170); }
    if (sub) sub.textContent = s.sub;
    if (bar) bar.style.width = s.pct + '%';
  }, 2000);
}

function stopScanning() {
  if (scanTimer) { clearInterval(scanTimer); scanTimer = null; }
}

// ── Filter ────────────────────────────────────────────────────
function toggleDur(d) {
  if(selectedDurs.includes(d) && selectedDurs.length===1) return;
  selectedDurs = selectedDurs.includes(d) ? selectedDurs.filter(x=>x!==d) : [...selectedDurs,d];
  [120,90,60].forEach(x => {
    document.getElementById('pill-'+x).className = 'filter-pill'+(selectedDurs.includes(x)?' on-'+x:'');
  });
  if(cache.today) renderTodayFromData(cache.today);
  if(cache.staff[activeStaff]) renderStaffFromData(cache.staff[activeStaff]);
}

// ── Tab ───────────────────────────────────────────────────────
function switchTab(id, btn) {
  currentTab = id;
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.pane').forEach(p=>p.classList.remove('active'));
  document.getElementById('pane-'+id).classList.add('active');
}

// ── Status bar ────────────────────────────────────────────────
function renderStatus(elId, text, color) {
  document.getElementById(elId).innerHTML =
    `<div class="status-dot" style="background:${color}"></div><span class="status-text" style="color:${color}">${text}</span>`;
}

function computeTodayStatus(slots) {
  const tk = todayKey();
  const todaySlots = slots.filter(s => s.dateKey === tk);
  if (todaySlots.length === 0) {
    const fut = slots.find(s => s.dateKey !== tk);
    if (!fut) return { text:'近期暫無可預約時段', color:'var(--red)' };
    return { text:`今日已滿，最早空位在${dateMeta(fut.dateKey).nearLabel}`, color:'var(--red)' };
  }
  if (todaySlots.length <= 3) return { text:`今日僅剩 ${todaySlots.length} 個時段`, color:'var(--red)' };
  return { text:'今日有多個時段可預約', color:'var(--green)' };
}

function computeStaffStatus(slots) {
  const tk = todayKey();
  const todayOk = slots.filter(s => s.dateKey === tk);
  if (slots.length === 0) return { text:`${activeStaff} 近期暫無可預約時段`, color:'var(--red)' };
  if (todayOk.length === 0) {
    const next = slots[0];
    return { text:`今日已滿，${activeStaff} 最早空位在${dateMeta(next.dateKey).nearLabel}`, color:'var(--red)' };
  }
  return { text:`${activeStaff} 今日有 ${todayOk.length} 個空位`, color:'var(--green)' };
}

// ── Card HTML ─────────────────────────────────────────────────
function cardHTML(slot, rank, flipCls, todayFull) {
  if (!slot) return `<div class="card-empty"><div class="card-empty-inner"><div class="card-empty-line"></div></div></div>`;
  const { mmdd, wd, nearLabel, diff } = dateMeta(slot.dateKey);
  const isToday = diff === 0;
  const bannerColor = TEACHER_COLOR[slot.teacher] || '#666';
  const durPills = slot.durations.map(d =>
    `<span class="dur-pill ${DUR_CONFIG[d].cls}">${DUR_CONFIG[d].short}</span>`
  ).join('');
  return `
  <div class="card">
    <div class="card-inner ${flipCls}" onclick="openSheet(${rank-1})">
      <div class="card-teacher-banner" style="background:${bannerColor}">
        <span class="card-teacher-name">${slot.teacher}</span>
        <span class="card-rank">#${rank}</span>
      </div>
      <div class="card-body">
        <div class="card-near-row">
          <span class="near-badge ${isToday?'today':'other'}">${nearLabel}</span>
          ${(!isToday&&todayFull)?'<span class="full-badge">今日已滿</span>':''}
        </div>
        <div class="card-date-row">
          <span class="card-mmdd">${mmdd}</span>
          <span class="card-wd">${wd}</span>
        </div>
        <div class="card-time">${slot.time}</div>
        <div class="card-div"></div>
        <div class="card-durs">${durPills}</div>
      </div>
    </div>
  </div>`;
}

function paintCards(containerId, slots) {
  const tk = todayKey();
  const todayFull = !slots.some(s => s.dateKey === tk);
  const padded = [...slots]; while(padded.length<3) padded.push(null);
  const classes = ['flip-1','flip-2','flip-3'];
  document.getElementById(containerId).innerHTML =
    padded.map((s,i) => cardHTML(s, i+1, classes[i], todayFull)).join('');
}

// ── Today ─────────────────────────────────────────────────────
async function loadToday() {
  showScanning('cards-today', 'status-today');
  try {
    const data = await callGAS({ action:'today' });
    cache.today = data;
    stopScanning();
    renderTodayFromData(data);
  } catch(e) {
    stopScanning();
    renderStatus('status-today', '連線失敗，請重新整理', 'var(--red)');
    document.getElementById('cards-today').innerHTML =
      `<div style="padding:16px 0;font-size:12px;color:var(--red)">❌ 無法取得資料，請重新整理</div>`;
  }
}

function renderTodayFromData(data) {
  const allSlots = (data.slots || [])
    .filter(s => s.durations.some(d => selectedDurs.includes(d)));

  const seenTeachers = new Set();
  const earliestPerTeacher = allSlots.filter(s => {
    if (seenTeachers.has(s.teacher)) return false;
    seenTeachers.add(s.teacher);
    return true;
  });

  earliestPerTeacher.sort((a, b) => {
    if (a.dateKey !== b.dateKey) return a.dateKey < b.dateKey ? -1 : 1;
    return a.time < b.time ? -1 : 1;
  });

  const status = computeTodayStatus(earliestPerTeacher);
  renderStatus('status-today', status.text, status.color);

  const top3 = earliestPerTeacher.slice(0, 3);
  tabSlots.today = top3;
  paintCards('cards-today', top3);
}

// ── Staff ─────────────────────────────────────────────────────
async function loadStaff(name) {
  activeStaff = name;
  if (cache.staff[name]) {
    renderStaffFromData(cache.staff[name]);
    return;
  }
  showScanning('cards-staff', 'status-staff');
  try {
    const data = await callGAS({ action:'staff', staff:name });
    cache.staff[name] = data;
    stopScanning();
    renderStaffFromData(data);
  } catch(e) {
    stopScanning();
    document.getElementById('cards-staff').innerHTML =
      `<div style="padding:16px 0;font-size:12px;color:var(--red)">❌ 無法取得資料</div>`;
  }
}

function renderStaffFromData(data) {
  const filtered = (data.slots || [])
    .filter(s => s.durations.some(d => selectedDurs.includes(d)))
    .slice(0, 3);

  const status = computeStaffStatus(filtered);
  renderStatus('status-staff', status.text, status.color);

  tabSlots.staff = filtered;
  paintCards('cards-staff', filtered);
}

// ── Bottom sheet ──────────────────────────────────────────────
function openSheet(slotIndex) {
  const wrap = document.getElementById('slot-summary-wrap');
  const slots = tabSlots[currentTab] || [];
  if (slotIndex !== null && slots[slotIndex]) {
    const slot = slots[slotIndex];
    const { mmdd, wd, nearLabel } = dateMeta(slot.dateKey);
    const pills = slot.durations.map(d =>
      `<span class="slot-dur-pill ${DUR_CONFIG[d].cls}">${DUR_CONFIG[d].short}</span>`
    ).join('');
    wrap.innerHTML = `
      <div class="slot-summary">
        <span class="slot-time-big">${slot.time}</span>
        <div class="slot-meta">
          <div class="slot-meta-name">${slot.teacher}</div>
          <div class="slot-meta-date">${nearLabel}　${mmdd}　${wd}</div>
        </div>
        <div class="slot-dur-pills">${pills}</div>
      </div>`;
  } else {
    wrap.innerHTML = '';
  }
  document.getElementById('mask').classList.add('show');
}

function closeSheet() { document.getElementById('mask').classList.remove('show'); }
function handleMaskClick(e) { if(e.target.id==='mask') closeSheet(); }

function goBooking() {
  closeSheet();
  const url = 'https://liff.line.me/2007603682-rDEPkdA2/a33MS6uxvrwXxin2jHTk4N/menu';
  if (typeof liff !== 'undefined' && liff.isInClient()) liff.openWindow({ url, external:false });
  else location.href = url;
}

// ── Staff tabs ────────────────────────────────────────────────
function buildStaffTabs() {
  const wrap = document.getElementById('staff-tabs');
  STAFF_LIST.forEach((name, i) => {
    const btn = document.createElement('button');
    btn.className = 'stab' + (i===0 ? ' active' : '');
    btn.textContent = name;
    btn.onclick = () => {
      document.querySelectorAll('.stab').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      btn.scrollIntoView({ behavior:'smooth', block:'nearest', inline:'center' });
      loadStaff(name);
    };
    wrap.appendChild(btn);
  });
}

// ── Init ──────────────────────────────────────────────────────
function init() {
  // 1. 預熱 GAS（立刻 ping，讓 GAS container 提前暖好）
  warmupGAS();

  // 2. LIFF 初始化
  if (typeof liff !== 'undefined') {
    liff.init({ liffId: LIFF_ID }).catch(() => {});
  }

  // 3. 建立 UI 並開始載入
  buildStaffTabs();
  loadToday();
  loadStaff(STAFF_LIST[0]);
}

init();
</script>
